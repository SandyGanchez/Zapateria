<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head>

<title>Catálogo Productos</title>


<div th:replace="~{lol :: bootstrap}">
</div>



<style>

.card img{

height:250px;
object-fit:cover;

}

</style>


</head>



<body>


<div th:replace="~{lol :: menu}">
</div>





<div class="container mt-4">



<div class="d-flex justify-content-between align-items-center">


<h2>
Catálogo de productos
</h2>



<a 
th:href="@{/extraerProductos/nuevo}"
class="btn btn-primary">

➕ Nuevo Producto

</a>


</div>

<br>





<div class="row">





<div 
class="col-md-4 mb-4"
th:each="producto : ${productos}">





<div class="card shadow">





<img 
th:src="${producto.imagen}"
class="card-img-top">





<div class="card-body">





<h4 
th:text="${producto.nombreSandraSG}">
</h4>





<p 
th:text="${producto.descripcion}">
</p>





<h5 class="text-success">

$

<span 
th:text="${producto.precio}">
</span>

</h5>







<p>
Marca:

<span th:text="${producto.marca?.nombreMarthaASL ?: 'Sin marca'}">
</span>

</p>








<span 
class="badge bg-success"
th:text="${producto.estatus}">
</span>





<br><br>





<a
th:href="@{'/extraerProductos/editar/' + ${producto.uuid}}"
class="btn btn-info btn-sm">

✏ Editar

</a>





<a
th:href="@{'/extraerProductos/eliminar/' + ${producto.uuid}}"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar producto?')">

🗑 Eliminar

</a>





</div>



</div>





</div>





</div>




</div>




</body>

</html>
