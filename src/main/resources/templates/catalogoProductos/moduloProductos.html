<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Productos</title>
	<div th:replace="~{lol :: bootstrap}"></div>

	<style>
		.img-producto{
			width:90px;
			height:90px;
			object-fit:cover;
			border-radius:10px;
		}
	</style>

</head>

<body>

<div th:replace="~{lol :: menu}"></div>


<div class="container mt-4">


	<h1 class="text-center mb-4" 
		th:text="${mensaje}">
		</h1>


	<div class="d-flex justify-content-between mb-3">

		<h3>Catálogo de Productos</h3>


		<a th:href="@{/extraerProductos/nuevo}" 
		   class="btn btn-primary">
		   ➕ Nuevo Producto
		</a>

	</div>



	<table class="table table-bordered table-striped table-hover shadow">


		<thead class="table-dark">

			<tr>

				<th>Imagen</th>
				<th>Producto</th>
				<th>Descripción</th>
				<th>Precio</th>
				<th>Marca</th>
				<th>Estatus</th>
				<th>Acciones</th>

			</tr>

		</thead>



		<tbody>


			<tr th:each="producto : ${productos}">


				<td>

					<img 
					th:src="${producto.imagen}"
					class="img-producto"
					alt="producto">

				</td>



				<td th:text="${producto.nombreSandraSG}">
				</td>



				<td th:text="${producto.descripcion}">
				</td>



				<td>

					$
					<span th:text="${producto.precio}">
					</span>

				</td>



				<td th:text="${producto.marca != null ? producto.marca.nombreMarthaASL : 'Sin marca'}">
				</td>



				<td>

					<span class="badge bg-success"
					th:text="${producto.estatus}">
					</span>

				</td>



				<td>


					<a 
					th:href="@{'/extraerProductos/editar/' + ${producto.uuid}}"
					class="btn btn-sm btn-info">

					✏️ Editar

					</a>



					<a 
					th:href="@{'/extraerProductos/eliminar/' + ${producto.uuid}}"
					class="btn btn-sm btn-danger"
					onclick="return confirm('¿Está seguro?')">

					🗑️ Eliminar

					</a>


				</td>


			</tr>


		</tbody>


	</table>



</div>


</body>

</html>
