<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Producto</title>
<div th:replace="~{lol :: bootstrap}"></div>
</head>


<body>

<div th:replace="~{lol :: menu}"></div>


<div class="container mt-4">


<h1 
th:text="${uuid} != null ? 'Editar Producto' : 'Nuevo Producto'">
</h1>



<form 
th:action="${uuid} == null ? @{/extraerProductos/guardar} : @{/extraerProductos/actualizar}"
method="post"
th:object="${producto}">



<input type="hidden" th:field="*{uuid}">



<div class="mb-3">

<label class="form-label">
Nombre:
</label>

<input 
class="form-control"
type="text"
th:field="*{nombreSandraSG}">

</div>




<div class="mb-3">

<label>
Descripción:
</label>

<input
class="form-control"
type="text"
th:field="*{descripcion}">

</div>




<div class="mb-3">

<label>
Precio:
</label>

<input
class="form-control"
type="number"
step="0.01"
th:field="*{precio}">

</div>




<div class="mb-3">

<label>
Imagen:
</label>

<input
class="form-control"
type="text"
th:field="*{imagen}">

</div>





<div class="mb-3">

<label>
Estatus:
</label>


<select 
class="form-control"
th:field="*{estatus}">


<option
th:each="estado : ${estados}"
th:value="${estado}"
th:text="${estado}">
</option>


</select>

</div>




<button class="btn btn-success">
Guardar
</button>


<a 
class="btn btn-secondary"
th:href="@{/extraerProductos/listar}">
Cancelar
</a>



</form>


</div>

</body>

</html>
