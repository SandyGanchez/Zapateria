<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Catálogo Pedidos</title>

	<div th:replace="~{lol :: bootstrap}"></div>

</head>

<body>

	<div th:replace="~{lol :: menu}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between">

			<h2>Catálogo de Pedidos</h2>

			<a th:href="@{/rutaPedidos/nuevo}" class="btn btn-primary">

				➕ Nuevo Pedido

			</a>

		</div>

		<br>

		<table class="table table-bordered">

			<thead>

				<tr>

					<th>Fecha</th>
					<th>Total</th>
					<th>Cliente</th>
					<th>Acciones</th>

				</tr>

			</thead>

			<tbody>

				<tr th:each="pedido : ${pedidos}">

					<td th:text="${pedido.fechaPedido}"></td>

					<td th:text="${pedido.total}"></td>

					<td th:text="${pedido.cliente.nombreMarthaAngelinaSL}"></td>

					<td>

						<a th:href="@{'/rutaPedidos/editar/' + ${pedido.uuid}}" class="btn btn-warning btn-sm">

							Editar

						</a>

						<a th:href="@{'/rutaPedidos/eliminar/' + ${pedido.uuid}}" class="btn btn-danger btn-sm"
							onclick="return confirm('¿Eliminar pedido?')">

							Eliminar

						</a>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

</body>

</html>
