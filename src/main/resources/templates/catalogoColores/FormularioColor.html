<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Color</title>
	<div th:replace="~{lol :: bootstrap}"></div>
</head>

<body>

	<div th:replace="~{lol :: menu}"></div>

	<div class="container mt-4">

		<div class="card shadow">

			<div class="card-header bg-success text-white">

			    <h2 class="mb-0"
			        th:text="${color.id == null ? '🎨 Nuevo Color' : '✏️ Editar Color'}">
			    </h2>

			</div>

				<form th:action="@{/extraerColores/guardar}" th:object="${color}" method="post">

					<input type="hidden" th:field="*{id}">

					<div class="mb-3">
						<label class="form-label">ColorJonatanMG</label>

						<input type="text" th:field="*{nombreJonatanMG}" class="form-control"
							placeholder="Ejemplo: Negro">
					</div>

					<div class="d-flex gap-2">

					    <button type="submit" class="btn btn-success">

					        <span th:if="${color.id == null}">
					            💾 Guardar
					        </span>

					        <span th:if="${color.id != null}">
					            ✏️ Actualizar
					        </span>

					    </button>

					    <a th:href="@{/extraerColores/listar}"
					       class="btn btn-secondary">

					        <span th:if="${color.id == null}">
					            ↩️ Cancelar
					        </span>

					        <span th:if="${color.id != null}">
					            ⬅️ Regresar
					        </span>

					    </a>

					</div>
				</form>

			</div>

		</div>

	</div>

</body>

</html>
